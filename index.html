<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Molina — Historial de Pozos</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<!-- Storage eliminado — fotos se guardan en Firestore -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">GM</div>
      <h1>Grupo Molina</h1>
      <p>Sistema de Historial de Pozos</p>
    </div>
    <div id="loginError" class="login-error hidden"></div>
    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input class="form-input" id="loginUser" type="text" placeholder="Ingresa tu usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="app hidden">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-icon">GM</div>
        <div>
          <div class="brand-name">Grupo Molina</div>
          <div class="brand-sub">Pozos</div>
        </div>
      </div>
    </div>

    <div class="sidebar-user" id="sidebarUser"></div>

    <div class="sidebar-search">
      <input type="text" placeholder="Buscar pozo..." id="searchInput" oninput="filterPozos()">
    </div>

    <div class="sidebar-list" id="sidebarList">
      <div class="sidebar-loading">Cargando pozos...</div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-admin hidden" id="btnAdminPanel" onclick="showSection('admin')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Gestionar usuarios
      </button>
      <button class="btn-logout" onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainArea">
    <div class="main-header" id="mainHeader">
      <div class="main-header-left">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menú">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2 id="mainTitle">Selecciona un pozo</h2>
      </div>
      <div class="header-actions" id="headerActions"></div>
    </div>

    <div class="content" id="mainContent">
      <div class="empty-state">
        <div class="empty-icon">🚰</div>
        <p>Selecciona un pozo del panel izquierdo<br>o agrega uno nuevo.</p>
      </div>
    </div>
  </div>
</div>

<!-- MODAL OVERLAY -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOnOverlay(event)">

  <!-- MODAL: NUEVO POZO -->
  <div class="modal hidden" id="modalNewPozo">
    <div class="modal-header">
      <h3>Nuevo pozo</h3>
      <button class="modal-close" onclick="hideModal('modalNewPozo')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Número de pozo *</label><input class="form-input" id="np_numero" type="number" placeholder="Ej. 1"></div>
        <div class="form-group"><label class="form-label">Campo *</label><input class="form-input" id="np_campo" placeholder="Ej. Los Vergeles"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Profundidad total</label><input class="form-input" id="np_profTotal" placeholder="Ej. 462ft (140m)"></div>
        <div class="form-group"><label class="form-label">Profundidad bomba</label><input class="form-input" id="np_profBomba" placeholder="Ej. 280ft (85m)"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">No. de flechas</label><input class="form-input" id="np_flechas" placeholder="Ej. 27 de 10in"></div>
        <div class="form-group"><label class="form-label">LPS</label><input class="form-input" id="np_lps" placeholder="Ej. 90"></div>
      </div>
      <div class="form-group"><label class="form-label">Bomba</label><input class="form-input" id="np_bomba" placeholder="Ej. Seminueva mod 14 GOULD 6 pasos"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Nivel estático</label><input class="form-input" id="np_nivelEst" placeholder="Ej. 147ft (44.8m)"></div>
        <div class="form-group"><label class="form-label">Nivel dinámico</label><input class="form-input" id="np_nivelDin" placeholder="Ej. Pendiente"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Voltaje nominal</label><input class="form-input" id="np_voltaje" placeholder="Ej. 440V"></div>
        <div class="form-group"><label class="form-label">Amperaje nominal</label><input class="form-input" id="np_amperaje" placeholder="Ej. 240A"></div>
      </div>
      <div class="form-group"><label class="form-label">Estado inicial</label>
        <select class="form-select" id="np_estado">
          <option value="operando">En operación</option>
          <option value="mantenimiento">En mantenimiento</option>
          <option value="fuera">Fuera de servicio</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="hideModal('modalNewPozo')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewPozo()">Guardar pozo</button>
    </div>
  </div>

  <!-- MODAL: NUEVO EVENTO -->
  <div class="modal hidden" id="modalNewEvento">
    <div class="modal-header">
      <h3>Registrar trabajo</h3>
      <button class="modal-close" onclick="hideModal('modalNewEvento')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Fecha *</label><input class="form-input" id="ne_fecha" type="date"></div>
        <div class="form-group"><label class="form-label">Tipo de trabajo *</label>
          <select class="form-select" id="ne_tipo">
            <option value="mantenimiento">Mantenimiento general</option>
            <option value="bomba">Cambio de bomba</option>
            <option value="motor">Cambio de motor</option>
            <option value="preventivo">Mantenimiento preventivo</option>
            <option value="cepillado">Cepillado</option>
            <option value="sifoneo">Sifoneo</option>
            <option value="camara">Introducción de cámara</option>
            <option value="limpieza">Limpieza</option>
            <option value="parchado">Parchado de ademe</option>
            <option value="otro">Otro</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Descripción *</label>
        <textarea class="form-textarea" id="ne_desc" placeholder="Describe el trabajo realizado, observaciones, lecturas de amperaje, LPS, etc..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Fotos (puedes seleccionar varias)</label>
        <div class="file-drop" id="fileDrop" onclick="document.getElementById('ne_fotos').click()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.4"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span id="fileDropLabel">Clic para seleccionar imágenes</span>
        </div>
        <input type="file" id="ne_fotos" multiple accept="image/*" style="display:none" onchange="previewFotos(this)">
        <div id="fotoPreviewGrid" class="foto-preview-grid"></div>
      </div>
      <div class="form-group"><label class="form-label">Actualizar estado del pozo</label>
        <select class="form-select" id="ne_estado">
          <option value="">— Sin cambio —</option>
          <option value="operando">En operación</option>
          <option value="mantenimiento">En mantenimiento</option>
          <option value="fuera">Fuera de servicio</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="hideModal('modalNewEvento')">Cancelar</button>
      <button class="btn btn-primary" id="btnGuardarEvento" onclick="saveNewEvento()">Registrar trabajo</button>
    </div>
  </div>

  <!-- MODAL: EDITAR POZO -->
  <div class="modal hidden" id="modalEditPozo">
    <div class="modal-header">
      <h3>Editar datos técnicos</h3>
      <button class="modal-close" onclick="hideModal('modalEditPozo')">✕</button>
    </div>
    <div class="modal-body" id="editPozoBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="hideModal('modalEditPozo')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEditPozo()">Guardar cambios</button>
    </div>
  </div>

  <!-- MODAL: ADMIN USUARIOS -->
  <div class="modal hidden" id="modalAdmin">
    <div class="modal-header">
      <h3>Gestión de usuarios</h3>
      <button class="modal-close" onclick="hideModal('modalAdmin')">✕</button>
    </div>
    <div class="modal-body" id="adminBody"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveUsers()">Guardar cambios</button>
    </div>
  </div>

  <!-- MODAL: VER FOTO GRANDE -->
  <div class="modal modal-foto hidden" id="modalFoto">
    <div class="modal-header">
      <h3 id="modalFotoTitle">Foto</h3>
      <button class="modal-close" onclick="hideModal('modalFoto')">✕</button>
    </div>
    <div class="modal-body" style="text-align:center;padding:0">
      <img id="modalFotoImg" src="" alt="Foto" style="max-width:100%;max-height:70vh;object-fit:contain;display:block;margin:0 auto">
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
